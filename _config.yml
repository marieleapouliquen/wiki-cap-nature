# -----------------------------------------------------------------------------
# Réglages du site
# -----------------------------------------------------------------------------
title: Les Ateliers Cap Nature
description: >-
  Les Ateliers Cap Nature :
  (Re)découvrir la nature avec des capteurs participatifs.
lang: fr
timezone: Europe/Paris

# URL de base : le site est publié sur https://<user>.github.io/wiki-cap-nature/
# donc baseurl vaut "/wiki-cap-nature". Pour un domaine racine, mettre "".
baseurl: "/wiki-cap-nature"
url: ""

# Crédits photos affichés dans le pied de page de l'accueil
# photo_credits: "Amee Fairbank-Brown, Don Coombez, Andrew Odintsov, Konstantin Nezhbert, Lex Melony, Vincent van Zalinge — Unsplash"

# -----------------------------------------------------------------------------
# Build
# -----------------------------------------------------------------------------
markdown: kramdown
permalink: pretty

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE

# Collections (les pages vivent dans _pages/)
collections:
  pages:
    output: true
    permalink: /:path/

# -----------------------------------------------------------------------------
# Navigation
# -----------------------------------------------------------------------------
# Le menu est défini dans _data/navigation.yml
