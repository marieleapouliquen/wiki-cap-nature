<div class="timeline">
  {%- for step in include.steps -%}
  <div class="timeline-item">
    <div class="timeline-time">{{ step.phase }}<span class="duration">{{ step.duration }}</span></div>
    <div class="timeline-content">
      <h3>{{ step.title }}</h3>
      <p>{{ step.text }}</p>
    </div>
  </div>
  {%- endfor -%}
</div>
